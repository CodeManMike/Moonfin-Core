name: Build Windows ARM64

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.2'
  VCPKG_DEFAULT_TRIPLET: arm64-windows
  VCPKG_TARGET_TRIPLET: arm64-windows

jobs:
  build-windows-arm64:
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v4

      - name: Verify ARM64 runner
        shell: pwsh
        run: |
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"
          Write-Host "PROCESSOR_ARCHITEW6432=$env:PROCESSOR_ARCHITEW6432"

          if ($env:PROCESSOR_ARCHITECTURE -ne "ARM64") {
            throw "This job must run on a native ARM64 Windows runner"
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Show Flutter environment
        shell: pwsh
        run: |
          flutter --version
          flutter doctor -v

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Install Windows ARM64 native dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT

          if (-not $vcpkgRoot) {
            $possibleRoots = @(
              "C:\vcpkg",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg",
              "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\vcpkg"
            )

            foreach ($root in $possibleRoots) {
              if (Test-Path (Join-Path $root "vcpkg.exe")) {
                $vcpkgRoot = $root
                break
              }
            }
          }

          if (-not $vcpkgRoot) {
            throw "Could not find vcpkg installation root"
          }

          $vcpkg = Join-Path $vcpkgRoot "vcpkg.exe"

          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg.exe not found at $vcpkg"
          }

          Write-Host "Using vcpkg: $vcpkg"
          Write-Host "Installing libarchive:arm64-windows"

          & $vcpkg install libarchive:arm64-windows
          & $vcpkg integrate install

      - name: Resolve dependencies
        shell: pwsh
        run: flutter pub get

      - name: Build Windows ARM64 release
        shell: pwsh
        env:
          VCPKG_DEFAULT_TRIPLET: arm64-windows
          VCPKG_TARGET_TRIPLET: arm64-windows
        run: |
          flutter clean
          flutter pub get
          flutter build windows --release --dart-define=DISTRIBUTION_CHANNEL=windows

      - name: Verify ARM64 executable
        shell: pwsh
        run: |
          $releaseExe = Get-ChildItem -Path build/windows -Filter moonfin.exe -Recurse -File |
            Where-Object { $_.FullName -match "\\arm64\\" } |
            Select-Object -First 1

          if (-not $releaseExe) {
            Write-Host "No executable found under an arm64 build folder. All moonfin.exe matches:"
            Get-ChildItem -Path build/windows -Filter moonfin.exe -Recurse -File |
              ForEach-Object { Write-Host "  - $($_.FullName)" }

            throw "Missing ARM64 moonfin.exe under build/windows/**/arm64/**"
          }

          Write-Host "Built executable: $($releaseExe.FullName)"

          $headers = dumpbin /headers $releaseExe.FullName
          $headers | Select-String "machine"

          if (-not ($headers | Select-String "ARM64")) {
            throw "Built executable is not ARM64"
          }

      - name: Package ARM64 release output
        shell: pwsh
        run: |
          $releaseExe = Get-ChildItem -Path build/windows -Filter moonfin.exe -Recurse -File |
            Where-Object { $_.FullName -match "\\arm64\\" } |
            Select-Object -First 1

          if (-not $releaseExe) {
            throw "Missing ARM64 moonfin.exe in build/windows"
          }

          $releaseDir = $releaseExe.Directory
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line.Split(':', 2)[1].Trim().Split('+')[0]
          $zipPath = Join-Path $PWD "Moonfin_Windows_ARM64_v$version.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $releaseDir.FullName '*') -DestinationPath $zipPath -Force

          Write-Host "Packaged ARM64 release from: $($releaseDir.FullName)"
          Write-Host "Created artifact: $zipPath"

      - name: Verify artifact
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -Path . -Filter "Moonfin_Windows_ARM64_v*.zip" -File -ErrorAction SilentlyContinue

          if (-not $artifact -or $artifact.Count -eq 0) {
            throw "Windows ARM64 package was not created"
          }

          Write-Host "Found artifact(s):"
          $artifact | ForEach-Object { Write-Host "  - $($_.Name)" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: Moonfin_Windows_ARM64_v*.zip
          if-no-files-found: error